server:
  port: 8021

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:bioafis}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:bioafis}
    password: ${DB_PASSWORD:bioafis}
    hikari:
      maximum-pool-size: 20
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL

bioafis:
  encryption:
    key: ${TEMPLATE_ENCRYPTION_KEY:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
  matching:
    default-threshold: ${MATCHING_THRESHOLD_DEFAULT:40.0}
    min-quality-score: ${MIN_QUALITY_SCORE:50}
    max-fingers-per-patient: ${MAX_FINGERS_PER_PATIENT:10}
    default-dpi: 500
  admin:
    api-key: ${ADMIN_API_KEY:admin-secret-key}
  cache:
    reload-on-startup: ${CACHE_RELOAD_ON_STARTUP:true}

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","logger":"%c{1}","message":"%m"}%n'
  level:
    root: ${LOG_LEVEL:INFO}
    com.airb.bioafis: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
